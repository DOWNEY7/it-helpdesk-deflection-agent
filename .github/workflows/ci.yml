name: CI — Test, Lint & Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    name: pytest + Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          MOCK_MODE: "true"
          ENVIRONMENT: "development"
          SESSION_SECRET_KEY: "ci-test-secret-key-32-chars-exactly"
          AUDIT_LOG_PATH: "/tmp/audit.jsonl"
          APP_LOG_PATH: "/tmp/app.jsonl"
        run: |
          pytest tests/ \
            -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false

  lint:
    name: Ruff Linting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.4.9

      - name: Run ruff
        run: ruff check app/ tests/ scripts/

  security-scan:
    name: Bandit + Safety
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: pip install bandit==1.7.9 safety==3.2.4

      - name: Run Bandit (static security analysis)
        run: |
          bandit -r app/ \
            --severity-level medium \
            --confidence-level medium \
            --exit-zero \
            -f json -o bandit-report.json || true
          # Fail on HIGH severity findings
          bandit -r app/ --severity-level high --exit-zero

      - name: Run Safety (dependency vulnerabilities)
        run: safety check -r requirements.txt --output bare || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: backend/bandit-report.json
