<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="IT Helpdesk escalation ticket queue — manage, assign and resolve employee IT support tickets.">
  <title>IT Helpdesk — Ticket Queue</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .page-wrapper { padding: 80px 1.5rem 2rem; max-width: 1400px; margin: 0 auto; }

    /* Filters bar */
    .filters-bar { display:flex; align-items:center; gap:0.75rem; flex-wrap:wrap; margin-bottom:1.5rem; }

    /* Ticket row clickable */
    .ticket-row { cursor: pointer; }
    .ticket-id-cell { font-family:'Courier New',monospace; font-size:0.75rem; }

    /* Slide-over panel */
    .slide-over-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      display: none;
      backdrop-filter: blur(4px);
    }
    .slide-over-backdrop.open { display: block; }

    .slide-over {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: min(600px, 100vw);
      background: var(--bg-surface);
      border-left: 1px solid var(--border-glass);
      z-index: 201;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .slide-over.open { transform: translateX(0); }

    .slide-over-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border-glass);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }
    .slide-over-body { flex: 1; overflow-y: auto; padding: 1.5rem; }
    .slide-over-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border-glass);
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    /* Conversation history */
    .conv-message { margin-bottom: 0.75rem; }
    .conv-role { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.2rem; }
    .conv-content {
      padding: 0.6rem 0.875rem;
      border-radius: var(--radius-md);
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .conv-user    { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.15); }
    .conv-assistant { background: var(--bg-glass); border: 1px solid var(--border-glass); }

    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-brand">
    <div class="brand-icon">🤖</div>
    <span>IT Support Assistant</span>
  </a>
  <div class="navbar-links" style="display:flex; align-items:center; gap:0.25rem;">
    <a href="index.html" class="nav-link">Chat</a>
    <a href="admin.html" class="nav-link active">Tickets</a>
    <a href="monitor.html" class="nav-link">Monitor</a>
    <div class="nav-status-dot" id="status-dot"></div>
  </div>
</nav>

<div class="page-wrapper">

  <!-- Header + KPI strip -->
  <div style="margin-bottom:1.5rem;">
    <h1 style="font-size:1.5rem; font-weight:700; background:var(--grad-primary); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">
      Escalation Queue
    </h1>
    <p class="text-secondary text-sm">Employee tickets that exceeded the confidence threshold</p>
  </div>

  <div class="kpi-grid" style="margin-bottom:1.5rem;">
    <div class="kpi-card">
      <div class="kpi-label">Open</div>
      <div class="kpi-value" id="kpi-open" style="background:var(--grad-red);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">In Progress</div>
      <div class="kpi-value" id="kpi-inprogress" style="background:var(--grad-amber);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Resolved Today</div>
      <div class="kpi-value" id="kpi-resolved" style="background:var(--grad-green);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Total Tickets</div>
      <div class="kpi-value" id="kpi-total">—</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters-bar">
    <select class="select-field" id="filter-status" aria-label="Filter by status">
      <option value="">All Statuses</option>
      <option value="open">Open</option>
      <option value="in_progress">In Progress</option>
      <option value="resolved">Resolved</option>
    </select>
    <select class="select-field" id="filter-category" aria-label="Filter by category">
      <option value="">All Categories</option>
      <option value="access">Access</option>
      <option value="network">Network</option>
      <option value="m365">M365</option>
      <option value="hardware">Hardware</option>
      <option value="software">Software</option>
      <option value="security">Security</option>
      <option value="email">Email</option>
      <option value="other">Other</option>
    </select>
    <button class="btn btn-ghost" id="refresh-btn" onclick="loadTickets()">↻ Refresh</button>
  </div>

  <!-- Tickets table -->
  <div class="glass-card" style="overflow:hidden;">
    <table class="data-table">
      <thead>
        <tr>
          <th>Ticket ID</th>
          <th>Summary</th>
          <th>Category</th>
          <th>Urgency</th>
          <th>Status</th>
          <th>Confidence</th>
          <th>Created</th>
        </tr>
      </thead>
      <tbody id="tickets-tbody">
        <tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--text-muted);">Loading…</td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- Slide-over backdrop -->
<div class="slide-over-backdrop" id="backdrop" onclick="closeSlideOver()"></div>

<!-- Slide-over panel -->
<div class="slide-over" id="slide-over" role="dialog" aria-modal="true" aria-label="Ticket details">
  <div class="slide-over-header">
    <div>
      <div class="ticket-id-cell" id="so-ticket-id" style="font-size:0.8rem; color:var(--text-muted); margin-bottom:0.25rem;"></div>
      <div id="so-summary" style="font-weight:600; font-size:1rem;"></div>
      <div style="display:flex; gap:0.5rem; margin-top:0.5rem;" id="so-badges"></div>
    </div>
    <button class="btn btn-ghost" onclick="closeSlideOver()" aria-label="Close panel">✕</button>
  </div>
  <div class="slide-over-body">
    <div style="margin-bottom:1.25rem;">
      <div class="text-xs text-muted font-semibold" style="text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.5rem;">Conversation History</div>
      <div id="so-conversation"></div>
    </div>
  </div>
  <div class="slide-over-footer">
    <select class="select-field" id="so-status-select" aria-label="Update ticket status">
      <option value="open">Open</option>
      <option value="in_progress">In Progress</option>
      <option value="resolved">Resolved</option>
      <option value="closed">Closed</option>
    </select>
    <button class="btn btn-primary" id="so-save-btn" onclick="saveTicketUpdate()">Save</button>
  </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
